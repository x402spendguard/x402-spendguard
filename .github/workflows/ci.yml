name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # TRACEABILITY.md is generated from REQUIREMENTS.md + the suite. Regenerate and fail if the
      # committed copy is stale, so the published matrix can never silently drift from reality.
      - run: npm run traceability
      - run: git diff --exit-code TRACEABILITY.md
      # docs/reason-codes.md is the deny-reason legend, generated from the reason registry. Regenerate
      # and fail if the committed copy is stale, so the legend can never drift from the emitted codes.
      - run: npm run reason-codes
      - run: git diff --exit-code docs/reason-codes.md

  # Windows job — verifies the POSIX permission gates degrade to an honest no-op on REAL Windows
  # (PLAT-01, D-035). The faked-platform tests (fs-perms.test.ts) prove the skip LOGIC on any host;
  # this proves Node's ACTUAL mode synthesis and the file store work on Windows, not just under a
  # mocked flag. Perm-refusal / owner-private tests self-skip on win32 (they assert POSIX-only
  # guarantees). Kept lean: the default gate + typecheck, no e2e (spawns processes) and no matrix
  # regen (LF-normalized + covered by the ubuntu job).
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # The live-flow harness, kept as a SEPARATE job so it is never conflated with the hermetic
  # green-main gate above. The deny-path suite is itself hermetic (localhost, no key, no funds),
  # so it is safe to run in CI; the deferred funded settle path is the only part that will ever
  # need secrets, and it stays out of automated CI.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # SMOKE_TEETH=1 turns on the cross-process teeth case (a deliberately non-atomic store must
      # OVER-allow) so the honesty gate's non-vacuousness is machine-verified here, not just by a
      # reviewer once. The test carries retry:3 to absorb cross-process scheduling jitter.
      - run: npm run test:e2e
        env:
          SMOKE_TEETH: "1"
